<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --black:#0A0A0A;--dark:#111111;--panel:#181818;--card:#1E1E1E;
  --line:rgba(255,255,255,.08);--neon:#BBFF00;
  --neon-dim:rgba(187,255,0,.12);--neon-mid:rgba(187,255,0,.25);
  --white:#FFFFFF;--muted:#888888;--r:20px;
}
html{scroll-behavior:smooth}
body{background:var(--black);color:var(--white);font-family:'Montserrat',sans-serif;overflow-x:hidden;font-size:15px;line-height:1.6}

/* NAV */
.nav{position:sticky;top:0;z-index:100;padding:0 40px;height:68px;display:flex;align-items:center;justify-content:space-between;background:rgba(10,10,10,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--line)}
.nav-logo{display:flex;align-items:center;gap:10px}
.nav-logo svg{height:28px;width:auto}
.nav-badge{background:var(--neon-dim);border:1px solid var(--neon-mid);color:var(--neon);font-size:10px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;padding:4px 10px;border-radius:99px}
.nav-links{display:flex;gap:28px;list-style:none}
.nav-links a{color:var(--muted);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;text-decoration:none;transition:color .2s}
.nav-links a:hover{color:var(--white)}

/* HERO */
.hero{min-height:100vh;display:grid;grid-template-columns:1fr 1fr;align-items:center;position:relative;overflow:hidden}
.hero-bg-img{position:absolute;inset:0;z-index:0}
.hero-bg-img img{width:100%;height:100%;object-fit:cover;object-position:center 20%}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(90deg,rgba(10,10,10,.97) 38%,rgba(10,10,10,.55) 65%,rgba(10,10,10,.18) 100%);z-index:1;pointer-events:none}
.hero-content{position:relative;z-index:2;padding:100px 0 80px 40px;max-width:600px}
.hero-right{position:relative;z-index:2;padding:100px 40px 80px 0;display:flex;align-items:center;justify-content:flex-end}
.hero-eyebrow{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--neon-mid);background:var(--neon-dim);color:var(--neon);font-size:10px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;padding:8px 14px;border-radius:99px;margin-bottom:28px}
.hero-eyebrow span{width:6px;height:6px;border-radius:50%;background:var(--neon);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
h1.hero-title{font-size:clamp(44px,5.2vw,76px);font-weight:900;line-height:.93;letter-spacing:-.045em;margin-bottom:24px}
h1.hero-title em{color:var(--neon);font-style:normal}
.hero-sub{font-size:17px;line-height:1.7;color:#BBBBBB;max-width:480px;margin-bottom:36px}
.hero-actions{display:flex;gap:12px;flex-wrap:wrap}
.btn-primary{background:var(--neon);color:#0A0A0A;font-size:12px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;padding:14px 28px;border-radius:99px;text-decoration:none;transition:transform .15s,box-shadow .15s}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(187,255,0,.3)}
.btn-ghost{border:1px solid rgba(255,255,255,.25);color:var(--white);font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:14px 28px;border-radius:99px;text-decoration:none;transition:border-color .2s}
.btn-ghost:hover{border-color:rgba(255,255,255,.6)}
.app-mockup-wrap{position:relative;width:300px}
.app-phone{width:100%;border-radius:40px;overflow:hidden;box-shadow:0 40px 80px rgba(0,0,0,.8),inset 0 0 0 1px rgba(255,255,255,.15)}
.app-phone img{width:100%;display:block}
.float{position:absolute;background:rgba(12,12,12,.92);border:1px solid rgba(255,255,255,.12);backdrop-filter:blur(16px);border-radius:14px;padding:12px 16px;min-width:120px}
.float strong{display:block;font-size:20px;font-weight:800;line-height:1;color:var(--white)}
.float span{display:block;margin-top:4px;font-size:9px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
.f1{left:-70px;top:60px}.f2{right:-60px;top:160px}.f3{left:-50px;bottom:130px}
.f4{right:-40px;bottom:80px;background:var(--neon)}.f4 strong{color:#0A0A0A}.f4 span{color:#263a00}

/* SECTIONS */
.section{padding:96px 40px;border-top:1px solid var(--line)}
.container{max-width:1200px;margin:0 auto}
.kicker{font-size:10px;font-weight:800;letter-spacing:.18em;text-transform:uppercase;color:var(--neon);margin-bottom:14px}
h2.section-title{font-size:clamp(32px,4vw,56px);font-weight:900;letter-spacing:-.04em;line-height:.98;margin-bottom:20px;max-width:820px}
.section-lead{font-size:17px;line-height:1.7;color:#999;max-width:640px;margin-bottom:48px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:32px;align-items:center}

/* STEPS */
.steps{display:grid;grid-template-columns:repeat(4,1fr);gap:0;margin-top:40px;position:relative}
.steps::before{content:"";position:absolute;top:28px;left:10%;right:10%;height:1px;background:linear-gradient(90deg,transparent,var(--neon-mid) 20%,var(--neon-mid) 80%,transparent)}
.step{padding:24px 20px;text-align:center;position:relative}
.step-num{width:56px;height:56px;border-radius:50%;background:var(--black);border:1px solid var(--neon-mid);color:var(--neon);font-size:13px;font-weight:900;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;position:relative;z-index:1}
.step h3{font-size:16px;font-weight:800;letter-spacing:-.02em;margin-bottom:8px;color:var(--white)}
.step p{font-size:13px;line-height:1.6;color:var(--muted)}

/* CURADORIA — ícones SVG limpos */
.req-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line);border-radius:20px;overflow:hidden}
.req-item{background:var(--card);padding:28px 24px;display:flex;align-items:flex-start;gap:16px;transition:background .2s}
.req-item:hover{background:#222}
.req-icon-wrap{width:44px;height:44px;border-radius:14px;background:var(--neon-dim);border:1px solid var(--neon-mid);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.req-icon-wrap svg{width:20px;height:20px;stroke:var(--neon);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.req-item h4{font-size:14px;font-weight:800;letter-spacing:-.01em;margin-bottom:4px;color:var(--white)}
.req-item p{font-size:12px;color:var(--muted);margin:0;line-height:1.5}

/* PILOTO */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:32px}
.stat-card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:28px;position:relative;overflow:hidden}
.stat-card::after{content:"";position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--neon),transparent)}
.stat-label{font-size:10px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
.stat-val{font-size:52px;font-weight:900;letter-spacing:-.04em;line-height:1;color:var(--white)}
.stat-sub{font-size:12px;color:var(--muted);margin-top:8px}

/* TIME JOIAS */
.time-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;border-radius:var(--r);overflow:hidden;border:1px solid var(--line)}
.time-img{position:relative;min-height:520px}
.time-img img{width:100%;height:100%;object-fit:cover;object-position:center top;display:block}
.time-img-overlay{position:absolute;inset:0;background:linear-gradient(90deg,transparent 55%,rgba(10,10,10,.35) 100%)}
.time-content{background:var(--neon);padding:44px 40px;display:flex;flex-direction:column;justify-content:center}
.time-kicker{font-size:10px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:#263a00;margin-bottom:16px}
.time-title{font-size:clamp(24px,2.6vw,36px);font-weight:900;letter-spacing:-.04em;line-height:1.0;color:#0A0A0A;margin-bottom:16px}
.time-text{font-size:14px;line-height:1.75;color:#1a2a00;margin-bottom:28px}
.commitment-list{display:flex;flex-direction:column;gap:8px}
.commit-row{display:flex;align-items:center;gap:10px;padding:10px 14px;background:rgba(0,0,0,.1);border-radius:10px}
.commit-row svg{width:14px;height:14px;stroke:#0A0A0A;fill:none;stroke-width:2.5;stroke-linecap:round;flex-shrink:0}
.commit-row span{font-size:12px;color:#0d1a00;font-weight:600}

/* DADOS — linha do tempo com canvas */
.dados-wrap{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-top:32px;align-items:stretch}
.chart-card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:32px;position:relative;overflow:hidden}
.chart-card h3{font-size:15px;font-weight:800;letter-spacing:-.02em;margin-bottom:28px;color:var(--white)}

/* LINHA CHART customizado */
.linechart-wrap{position:relative;height:200px}
.linechart-wrap canvas{width:100%!important;height:100%!important}

/* RADAR / INDICADORES — barras horizontais premium */
.indicators{display:flex;flex-direction:column;gap:20px}
.ind-row{}
.ind-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
.ind-label{font-size:12px;font-weight:700;color:#CCC;letter-spacing:.04em}
.ind-val{font-size:18px;font-weight:900;color:var(--neon);letter-spacing:-.02em}
.ind-track{height:6px;background:rgba(255,255,255,.07);border-radius:99px;overflow:hidden;position:relative}
.ind-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,rgba(187,255,0,.5),var(--neon));position:relative;transition:width 1.4s cubic-bezier(.4,0,.2,1)}
.ind-fill::after{content:"";position:absolute;right:0;top:-3px;width:12px;height:12px;border-radius:50%;background:var(--neon);box-shadow:0 0 8px var(--neon),0 0 20px rgba(187,255,0,.4)}

/* ESCALA */
.escala-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;border-radius:var(--r);overflow:hidden;border:1px solid var(--line)}
.escala-img{position:relative;min-height:500px}
.escala-img img{width:100%;height:100%;object-fit:cover;display:block}
.escala-img-overlay{position:absolute;inset:0;background:linear-gradient(180deg,rgba(10,10,10,.25) 0%,rgba(10,10,10,.6) 100%)}
.escala-content{background:var(--panel);padding:52px 44px;display:flex;flex-direction:column;justify-content:center}
.modalities{display:flex;flex-wrap:wrap;gap:8px;margin-top:18px}
.mod-tag{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:#CCCCCC;font-size:11px;font-weight:700;padding:7px 14px;border-radius:99px;transition:border-color .2s,color .2s;cursor:default}
.mod-tag:hover{border-color:var(--neon-mid);color:var(--white)}
.mod-tag.active{background:var(--neon-dim);border-color:var(--neon-mid);color:var(--neon)}
.divider{height:1px;background:var(--line);margin:32px 0}

/* TIMELINE */
.timeline{position:relative;padding-left:28px;margin-top:24px}
.timeline::before{content:"";position:absolute;left:7px;top:8px;bottom:8px;width:1px;background:linear-gradient(180deg,var(--neon),rgba(187,255,0,.08))}
.tl-item{position:relative;padding:0 0 26px 24px}
.tl-dot{position:absolute;left:-21px;top:6px;width:14px;height:14px;border-radius:50%;background:var(--black);border:2px solid var(--neon);box-shadow:0 0 10px rgba(187,255,0,.35)}
.tl-phase{font-size:9px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--neon);margin-bottom:4px}
.tl-item h4{font-size:15px;font-weight:800;letter-spacing:-.02em;margin-bottom:5px;color:var(--white)}
.tl-item p{font-size:12px;color:var(--muted);line-height:1.6}

/* PROGRAMA */
.programa-img{border-radius:var(--r);overflow:hidden;position:relative;height:500px}
.programa-img img{width:100%;height:100%;object-fit:cover;object-position:center top;display:block}
.programa-img-overlay{position:absolute;inset:0;background:linear-gradient(180deg,transparent 40%,rgba(10,10,10,.88) 100%)}
.img-tags{position:absolute;bottom:20px;left:20px;right:20px;display:flex;gap:8px;flex-wrap:wrap}
.img-tag{background:rgba(187,255,0,.15);border:1px solid rgba(187,255,0,.35);color:var(--neon);font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;padding:5px 12px;border-radius:99px}

/* FOOTER */
.footer{padding:48px 40px;border-top:1px solid var(--line);background:var(--dark)}
.footer-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:24px}
.footer-text{font-size:13px;color:var(--muted)}
.footer-badge{background:var(--neon-dim);border:1px solid var(--neon-mid);color:var(--neon);font-size:10px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;padding:6px 14px;border-radius:99px}

/* REVEAL */
.reveal{opacity:0;transform:translateY(28px);transition:opacity .7s cubic-bezier(.4,0,.2,1),transform .7s cubic-bezier(.4,0,.2,1)}
.reveal.visible{opacity:1;transform:none}

/* ── RESPONSIVE ── */

  .f1,.f2,.f3,.f4{display:none}

}

    align-items:flex-end;
  }
  .hero-bg-img img{object-position:60% center}
  .hero-overlay{
    background:linear-gradient(
      180deg,
      rgba(10,10,10,.3) 0%,
      rgba(10,10,10,.6) 40%,
      rgba(10,10,10,.97) 75%,
      rgba(10,10,10,1) 100%
    )
  }
  .hero-content{
    padding:0 24px 64px;
    max-width:100%;
  }
  .hero-right{display:none}

  /* SECTIONS */
  .section{padding:64px 20px}

  /* GRIDS */

  .dados-wrap,
  .time-grid,
  .escala-grid{grid-template-columns:1fr}

@media(max-width:400px){

@media(max-width:640px){
  .stat-val{font-size:clamp(24px,9vw,40px)!important;line-height:1.1!important}

}

/* JUSTIFICATIVA */
.problema-grid{display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:center}
.problema-callouts{display:grid;grid-template-columns:1fr;gap:14px;margin-top:32px}
.callout-card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:22px 26px;display:flex;align-items:flex-start;gap:18px;transition:border-color .2s}
.callout-card:hover{border-color:var(--neon-mid)}
.callout-num{font-size:28px;font-weight:900;color:var(--neon);letter-spacing:-.04em;line-height:1;flex-shrink:0;min-width:36px}
.callout-card h4{font-size:14px;font-weight:800;color:var(--white);margin-bottom:4px}
.callout-card p{font-size:13px;color:var(--muted);line-height:1.55;margin:0}

/* COMO FUNCIONA — redesign com mais impacto */
.steps-v2{display:grid;grid-template-columns:repeat(4,1fr);gap:2px;margin-top:56px;background:var(--line);border-radius:24px;overflow:hidden}
.step-v2{background:var(--card);padding:40px 28px 36px;position:relative;transition:background .25s}
.step-v2:hover{background:#1c1c1c}
.step-v2:first-child{border-radius:22px 0 0 22px}
.step-v2:last-child{border-radius:0 22px 22px 0}
.step-v2-num{font-size:72px;font-weight:900;letter-spacing:-.06em;line-height:.85;color:rgba(187,255,0,.12);margin-bottom:32px;transition:color .25s}
.step-v2:hover .step-v2-num{color:rgba(187,255,0,.22)}
.step-v2-badge{display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:50%;background:var(--neon-dim);border:1px solid var(--neon-mid);color:var(--neon);font-size:10px;font-weight:900;letter-spacing:.05em;margin-bottom:16px}
.step-v2 h3{font-size:18px;font-weight:900;letter-spacing:-.03em;color:var(--white);margin-bottom:10px}
.step-v2 p{font-size:13px;line-height:1.65;color:var(--muted)}
.step-v2-bar{position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--neon-mid) 50%,transparent);opacity:0;transition:opacity .25s}
.step-v2:hover .step-v2-bar{opacity:1}

/* PARCEIROS */
.parceiros-intro{max-width:720px;margin-bottom:56px}
.beneficios-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:40px}
.beneficio-card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:28px 24px;transition:border-color .2s,background .2s}
.beneficio-card:hover{border-color:var(--neon-mid);background:#1a1a1a}
.ben-icon{width:44px;height:44px;border-radius:14px;background:var(--neon-dim);border:1px solid var(--neon-mid);display:flex;align-items:center;justify-content:center;margin-bottom:16px}
.ben-icon svg{width:20px;height:20px;stroke:var(--neon);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.beneficio-card h4{font-size:15px;font-weight:800;letter-spacing:-.02em;margin-bottom:8px;color:var(--white)}
.beneficio-card p{font-size:13px;color:var(--muted);line-height:1.6;margin:0}
.content-tipos{display:flex;flex-wrap:wrap;gap:8px;margin-top:24px}
.content-tag{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);border-radius:10px;padding:10px 14px;font-size:12px;font-weight:600;color:#CCC;transition:border-color .2s,color .2s}
.content-tag:hover{border-color:var(--neon-mid);color:var(--white)}
.content-tag svg{width:14px;height:14px;stroke:var(--neon);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}

/* CTA FINAL */
.cta-section{background:linear-gradient(135deg,rgba(187,255,0,.07) 0%,rgba(187,255,0,.02) 100%);border:1px solid var(--neon-mid);border-radius:24px;padding:72px 56px;text-align:center;position:relative;overflow:hidden}
.cta-section::before{content:"";position:absolute;top:-80px;left:50%;transform:translateX(-50%);width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(187,255,0,.07) 0%,transparent 70%);pointer-events:none}
.cta-section > *{position:relative;z-index:1}
.cta-title{font-size:clamp(28px,3.5vw,52px);font-weight:900;letter-spacing:-.045em;color:var(--white);margin-bottom:16px;line-height:1.0}
.cta-sub{font-size:16px;color:#999;line-height:1.7;max-width:560px;margin:0 auto 40px}
.cta-actions{display:flex;justify-content:center;gap:12px;flex-wrap:wrap}
.btn-neon{background:var(--neon);color:#0A0A0A;font-size:13px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;padding:16px 36px;border-radius:99px;text-decoration:none;transition:transform .15s,box-shadow .15s;display:inline-flex;align-items:center;gap:8px}
.btn-neon:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(187,255,0,.35)}
.btn-neon svg{width:14px;height:14px;stroke:#0A0A0A;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}

/* RESPONSIVE novos */
@media(max-width:960px){
  .problema-grid{grid-template-columns:1fr;gap:40px}
  .steps-v2{grid-template-columns:1fr 1fr;border-radius:16px}

  .btn-neon,.btn-ghost{width:100%;justify-content:center;text-align:center}
}

/* COMO FUNCIONA — animação escalonada + conector */
@keyframes stepReveal {
  from { opacity:0; transform:translateY(28px) }
  to   { opacity:1; transform:translateY(0) }
}

.steps-v2.animated .step-v2 {
  animation: stepReveal .55s cubic-bezier(.22,.68,0,1.2) both;
}
.steps-v2.animated .step-v2:nth-child(1){ animation-delay:.05s }
.steps-v2.animated .step-v2:nth-child(2){ animation-delay:.18s }
.steps-v2.animated .step-v2:nth-child(3){ animation-delay:.31s }
.steps-v2.animated .step-v2:nth-child(4){ animation-delay:.44s }

/* seta conectora entre cards */
.step-v2{overflow:visible}
.step-v2:not(:last-child)::after{
  content:"";
  position:absolute;
  top:50%;right:-14px;
  transform:translateY(-50%);
  width:0;height:0;
  border-top:7px solid transparent;
  border-bottom:7px solid transparent;
  border-left:10px solid rgba(187,255,0,.18);
  z-index:10;
  transition:border-left-color .25s;
}
.steps-v2.animated .step-v2:not(:last-child)::after{
  animation:arrowFade .3s ease both;
}
.steps-v2.animated .step-v2:nth-child(1)::after{ animation-delay:.30s }
.steps-v2.animated .step-v2:nth-child(2)::after{ animation-delay:.43s }
.steps-v2.animated .step-v2:nth-child(3)::after{ animation-delay:.56s }

@keyframes arrowFade{
  from{opacity:0;transform:translateY(-50%) scale(.5)}
  to{opacity:1;transform:translateY(-50%) scale(1)}
}

.step-v2:hover::after{border-left-color:rgba(187,255,0,.55)!important}

/* ghost number ajustado (sem badge) */
.step-v2-num{
  font-size:80px;
  margin-bottom:24px;
  color:rgba(187,255,0,.10);
}
.step-v2:hover .step-v2-num{color:rgba(187,255,0,.25)}

@media(max-width:960px){
  .step-v2:not(:last-child)::after{display:none}
}
